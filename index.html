<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ギルド配置図 v29.1.52</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { --panel-h: 280px; --panel-w: 240px; }
        body { margin: 0; overflow: hidden; background: #e0e5ec; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        #main-container { flex: 1; position: relative; overflow: hidden; }
        canvas { display: block; background: #f0f0f0; width: 100%; height: 100%; }
        
        #top-panel { position: absolute; top: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.9); border-bottom: 1px solid #ccc; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; z-index: 100; gap: 8px; }
        #cur-box { width: 50px; height: 50px; border: 2px solid #007aff; border-radius: 8px; background: #fff; background-size: contain; background-repeat: no-repeat; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #007aff; font-weight: bold; text-align: center; overflow: hidden; }
        #open-list-btn { width: 50px; height: 50px; border-radius: 8px; border: 1px solid #ccc; background: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .deselect-btn { height: 50px; padding: 0 8px; border-radius: 8px; border: 1px solid #ccc; background: #eee; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        #bot-panel { background: rgba(255,255,255,0.98); border-top: 1px solid #ccc; padding: 8px 10px; box-sizing: border-box; z-index: 100; display: flex; flex-direction: column; gap: 6px; height: var(--panel-h); }
        
        @media (orientation: landscape) { 
            body { flex-direction: row; } 
            #bot-panel { width: var(--panel-w); height: 100%; border-top: none; border-left: 1px solid #ccc; padding: 10px 8px; overflow-y: auto; flex-shrink: 0; } 
        }

        .row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .row label { font-size: 10px; font-weight: bold; width: 40px; }
        input[type="text"] { flex: 1; height: 30px; border: 1px solid #ccc; border-radius: 4px; padding: 0 5px; font-size: 14px; }
        .prec-btn { width: 30px; height: 30px; border: 1px solid #ccc; background: #fff; border-radius: 4px; }

        .tool-section { display: flex; gap: 8px; margin-top: 5px; }
        #nudge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 90px; }
        #nudge-grid button { height: 35px; border: 1px solid #ccc; background: #fff; border-radius: 4px; }

        .mode-box { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .mode-row { display: flex; gap: 2px; }
        .mode-row button { flex: 1; height: 30px; font-size: 10px; border: 1px solid #ccc; background: #fff; border-radius: 4px; }
        .mode-row button.active { background: #007aff; color: #fff; }
        .save-btn { height: 35px; background: #34c759; color: white; border: none; border-radius: 4px; font-weight: bold; }

        #asset-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; }
        #asset-modal { width: 90%; max-height: 80%; background: #f0f0f0; border-radius: 12px; padding: 15px; overflow-y: auto; }
        #asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; }
        .thumb { width: 60px; height: 60px; border-radius: 8px; border: 2px solid #ccc; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #fff; }
    </style>
</head>
<body>

<div id="main-container">
    <canvas id="cvs"></canvas>
    <div id="top-panel">
        <div id="cur-box">未選択</div>
        <button id="open-list-btn" onclick="toggleAssetModal(true)">＋</button>
        <button class="deselect-btn" onclick="deselect()">選択解除</button>
        <button style="margin-left:auto; height:50px; border-radius:8px; border:1px solid #ff9500; background:#fff; color:#ff9500;" onclick="location.reload()">🔄</button>
    </div>
</div>

<div id="bot-panel">
    <div class="row">
        <label>名前</label>
        <input type="text" id="mem-name" placeholder="ギルメン名を入力" oninput="updateMemberName(this.value)">
    </div>
    <div class="row">
        <label>サイズ</label>
        <button class="prec-btn" onclick="adjS(-0.05)">-</button>
        <input type="range" id="size-s" min="0.1" max="3" step="0.05" style="flex:1;">
        <button class="prec-btn" onclick="adjS(0.05)">+</button>
    </div>
    <div class="tool-section">
        <div id="nudge-grid">
            <button style="grid-column:2" onclick="nudge(0,-0.1)">↑</button>
            <button style="grid-column:1" onclick="nudge(-0.1,0)">←</button>
            <button style="grid-column:2" onclick="nudge(0,0.1)">↓</button>
            <button style="grid-column:3" onclick="nudge(0.1,0)">→</button>
        </div>
        <div class="mode-box">
            <button class="save-btn" onclick="exportImage()">画像として保存</button>
            <div class="mode-row">
                <button class="active" id="m-move" onclick="setMode('move')">移動</button>
                <button id="m-erase" onclick="setMode('erase')">消去</button>
                <button id="m-pen" onclick="setMode('pen')">ペン</button>
            </div>
            <button style="height:30px; background:#5856d6; color:white; border:none; border-radius:4px; font-size:10px;" onclick="exportURL()">共有URLを発行</button>
        </div>
    </div>
</div>

<div id="asset-overlay" onclick="if(event.target==this)toggleAssetModal(false)">
    <div id="asset-modal"><div id="asset-grid">
        <label style="width:60px; height:60px; border:2px dashed #bbb; border-radius:8px; display:flex; justify-content:center; align-items:center; background:#fff;">📁<input type="file" id="img-in" hidden accept="image/*" multiple onchange="handleFiles(this.files)"></label>
    </div></div>
</div>
<div id="export-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; flex-direction:column; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <img id="export-img" style="max-width:90%; max-height:80%; border:2px solid #fff;">
    <p style="color:white; margin-top:10px;">画像を長押しで保存してね</p>
</div>

<script>
const PRESETS = [
    { name: "避難所", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/HQ.png", s: 1.5, o: 0, gw: 2, gh: 2 }
];

const cvs = document.getElementById('cvs'); const ctx = cvs.getContext('2d');
const T_W = 64, T_H = 32;
let cam = { x: 0, y: 0, z: 1 }, assets = [], map = [], lines = [], selIdx = -1, activeAsset = -1, mode = 'move';
let drag = false, pinch = false, lockedId = null, penStart = null, penCurrent = null, lastT = {x: 0, y: 0}, lastDist = 0;

function init() { 
    window.addEventListener('resize', resize); resize(); 
    cam.x = cvs.width/2; cam.y = cvs.height/3;
    loadPresets().then(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('d')) applyData(params.get('d')); else load();
        render();
    });
    setupEvents();
}

function drawTag(name, x, y) {
    if(!name) return;
    ctx.save();
    const fontSize = Math.max(10, 12 / cam.z);
    ctx.font = `bold ${fontSize}px sans-serif`;
    const tw = ctx.measureText(name).width;
    const padding = 4 / cam.z;
    ctx.fillStyle = "rgba(0, 60, 180, 0.8)";
    ctx.fillRect(x - tw/2 - padding, y - fontSize/2 - padding, tw + padding*2, fontSize + padding*2);
    ctx.strokeStyle = "white"; ctx.lineWidth = 1/cam.z;
    ctx.strokeRect(x - tw/2 - padding, y - fontSize/2 - padding, tw + padding*2, fontSize + padding*2);
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(name, x, y + 1/cam.z);
    ctx.restore();
}

function render() {
    ctx.clearRect(0,0,cvs.width,cvs.height); ctx.save(); ctx.translate(cam.x, cam.y); ctx.scale(cam.z, cam.z);
    ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 1/cam.z;
    for(let i=-20; i<=40; i++){
        let s1 = toS(i,-20), e1 = toS(i,40); ctx.beginPath(); ctx.moveTo(s1.x,s1.y); ctx.lineTo(e1.x,e1.y); ctx.stroke();
        let s2 = toS(-20,i), e2 = toS(40,i); ctx.beginPath(); ctx.moveTo(s2.x,s2.y); ctx.lineTo(e2.x,e2.y); ctx.stroke();
    }
    lines.forEach(l => { ctx.beginPath(); ctx.strokeStyle = "red"; ctx.lineWidth = 3/cam.z; const s = toS(l.x1, l.y1), e = toS(l.x2, l.y2); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke(); });
    
    map.sort((a,b)=>(a.x+a.y)-(b.x+b.y)).forEach((d, i) => {
        const a = assets[d.aIdx]; if(!a) return;
        const w = T_W * d.s, h = (a.img.height/a.img.width) * w, anchor = toS(d.x + a.gw, d.y + a.gh);
        ctx.drawImage(a.img, anchor.x - w/2 + (d.ox*T_W), anchor.y - h + d.off, w, h);
        
        const pTag = toS(d.x + a.gw/2, d.y + a.gh/2);
        drawTag(d.userName, pTag.x, pTag.y - 10/cam.z);

        if(selIdx === i || lockedId === d.id) {
            ctx.strokeStyle = "#007aff"; ctx.lineWidth = 2/cam.z;
            const p1 = toS(d.x, d.y), p2 = toS(d.x+a.gw, d.y), p3 = toS(d.x+a.gw, d.y+a.gh), p4 = toS(d.x, d.y+a.gh);
            ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.lineTo(p3.x,p3.y); ctx.lineTo(p4.x,p4.y); ctx.closePath(); ctx.stroke();
        }
    });
    ctx.restore();
}

function handleStart(x, y) {
    const g = toG(x, y);
    if(mode === 'pen') { penStart = {x:Math.round(g.x), y:Math.round(g.y)}; return; }
    let hit = map.findLastIndex(d => g.x >= d.x && g.x < d.x + assets[d.aIdx].gw && g.y >= d.y && g.y < d.y + assets[d.aIdx].gh);
    if(mode === 'erase' && hit !== -1) { map.splice(hit, 1); save(); render(); return; }
    if(hit !== -1) {
        selIdx = hit; lockedId = map[hit].id; 
        document.getElementById('mem-name').value = map[hit].userName || "";
        updatePanel(); render();
    } else {
        if(activeAsset !== -1) {
            const a = assets[activeAsset];
            const n = {id:Date.now(), x:Math.floor(g.x), y:Math.floor(g.y), aIdx:activeAsset, s:a.defS, off:0, ox:0, oy:0, userName:""};
            map.push(n); selIdx = map.length-1; save(); render();
        } else { deselect(); drag = true; }
    }
}

function updateMemberName(val) { if(selIdx !== -1) { map[selIdx].userName = val; save(); render(); } }
function toggleAssetModal(s) { document.getElementById('asset-overlay').style.display = s?'flex':'none'; }
function addThumb(i) { const d = document.createElement('div'); d.className='thumb'; d.style.backgroundImage=`url(${assets[i].src})`; d.onclick=()=>{activeAsset=i; deselect(); toggleAssetModal(false); updateCurBox();}; document.getElementById('asset-grid').appendChild(d); }
function updateCurBox() { const b = document.getElementById('cur-box'); if(activeAsset!==-1){ b.style.backgroundImage=`url(${assets[activeAsset].src})`; b.textContent=""; }else{ b.style.backgroundImage="none"; b.textContent="未選択"; } }
function deselect() { selIdx=-1; lockedId=null; activeAsset=-1; document.getElementById('mem-name').value=""; updateCurBox(); render(); }
function setMode(m) { mode=m; document.querySelectorAll('.mode-row button').forEach(b=>b.classList.remove('active')); document.getElementById('m-'+m).classList.add('active'); }
function resize() { cvs.width=cvs.parentElement.clientWidth; cvs.height=cvs.parentElement.clientHeight; render(); }
const toS = (gx, gy) => ({ x: (gx - gy) * (T_W/2), y: (gx + gy) * (T_H/2) });
const toG = (sx, sy) => { let x=(sx-cam.x)/cam.z, y=(sy-cam.y)/cam.z; let gy=(y/(T_H/2)-x/(T_W/2))/2; return {x:x/(T_W/2)+gy, y:gy}; };
function setupEvents() {
    cvs.addEventListener('mousedown', e=>{ lastT={x:e.clientX, y:e.clientY}; handleStart(e.clientX, e.clientY); });
    window.addEventListener('mousemove', e=>{ 
        if(lockedId) { const g=toG(e.clientX, e.clientY); const d=map.find(m=>m.id===lockedId); if(d){d.x=Math.floor(g.x); d.y=Math.floor(g.y); save();} }
        else if(drag) { cam.x+=e.clientX-lastT.x; cam.y+=e.clientY-lastT.y; }
        lastT={x:e.clientX, y:e.clientY}; render();
    });
    window.addEventListener('mouseup', ()=>{ drag=false; lockedId=null; });
}
async function loadPresets() { for(const p of PRESETS){ await new Promise(r=>{ const img=new Image(); img.crossOrigin="anonymous"; img.onload=()=>{ assets.push({img, src:p.url, defS:p.s, gw:p.gw, gh:p.gh}); addThumb(assets.length-1); r(); }; img.src=p.url; }); } }
function save() { localStorage.setItem('map_v21', JSON.stringify({m:map, l:lines})); }
function load() { const s=localStorage.getItem('map_v21'); if(s){ const d=JSON.parse(s); map=d.m||[]; lines=d.l||[]; } }
function updatePanel() { if(selIdx!==-1) document.getElementById('size-s').value=map[selIdx].s; }
function adjS(v) { if(selIdx!==-1){ map[selIdx].s+=v; save(); render(); } }
function nudge(dx,dy) { if(selIdx!==-1){ map[selIdx].ox+=dx; map[selIdx].oy+=dy; save(); render(); } }
function exportImage() { deselect(); render(); document.getElementById('export-img').src=cvs.toDataURL(); document.getElementById('export-overlay').style.display='flex'; }
function exportURL() { const compressed=LZString.compressToEncodedURIComponent(JSON.stringify({m:map, l:lines})); window.prompt("共有URL:", window.location.href.split('?')[0]+"?d="+compressed); }
function applyData(d) { try { const j=JSON.parse(LZString.decompressFromEncodedURIComponent(d)); map=j.m; lines=j.l; render(); }catch(e){} }
init();
</script>
</body>
</html>
