<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>避難所レイアウト v29.1.65</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { --panel-h: 250px; --panel-w: 220px; }
        body { margin: 0; overflow: hidden; background: #e0e5ec; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        #main-container { flex: 1; position: relative; overflow: hidden; }
        canvas { display: block; background: #f0f0f0; width: 100%; height: 100%; cursor: crosshair; }
        
        #top-panel { position: absolute; top: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.9); border-bottom: 1px solid #ccc; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; z-index: 100; gap: 8px; }
        #cur-box { width: 50px; height: 50px; border: 2px solid #007aff; border-radius: 8px; background: #fff; background-size: contain; background-repeat: no-repeat; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #007aff; font-weight: bold; text-align: center; }
        #open-list-btn { width: 50px; height: 50px; border-radius: 8px; border: 1px solid #ccc; background: #fff; font-size: 24px; color: #666; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .deselect-btn { height: 50px; padding: 0 8px; border-radius: 8px; border: 1px solid #ccc; background: #eee; color: #666; font-size: 11px; font-weight: bold; flex-shrink: 0; cursor: pointer; }
        .reload-btn { height: 50px; width: 50px; margin-left: auto; border-radius: 8px; border: 1px solid #ff9500; background: #fff; color: #ff9500; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }

        #bot-panel { background: rgba(255,255,255,0.98); border-top: 1px solid #ccc; padding: 8px 10px; box-sizing: border-box; z-index: 100; display: flex; flex-direction: column; gap: 6px; height: var(--panel-h); }
        
        /* --- 横向き：ここを「かっちり」収まるように修正 --- */
        @media (orientation: landscape) { 
            :root { --panel-w: 200px; } /* 少し絞って余裕を持たせる */
            body { flex-direction: row; } 
            #bot-panel { width: var(--panel-w); height: 100%; border-top: none; border-left: 1px solid #ccc; padding: 10px 6px; overflow-y: auto; flex-shrink: 0; gap: 8px; } 
            .tool-section { flex-direction: column; gap: 10px; align-items: center; }
            
            /* 横向きの時だけ-+ボタンをシュッとスリムに */
            .prec-btn { width: 24px !important; font-size: 14px; }
            .row { gap: 4px; width: 100%; }
            .row label { width: 30px; font-size: 10px; }
            input[type="range"] { min-width: 0; }
        }
        
        .row { display: flex; align-items: center; gap: 8px; }
        .row label { font-size: 11px; font-weight: bold; width: 35px; flex-shrink: 0; }
        input[type="range"] { flex: 1; height: 32px; cursor: pointer; }
        .prec-btn { width: 34px; height: 32px; font-size: 16px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; flex-shrink: 0; padding: 0; }
        
        .tool-section { display: flex; justify-content: space-between; gap: 8px; }
        #nudge-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 4px; width: 110px; flex-shrink: 0; }
        #nudge-grid button { height: 40px; font-size: 20px; border: 1px solid #ccc; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 0 #ddd; cursor: pointer; }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        .mode-box { flex: 1; display: flex; flex-direction: column; gap: 4px; width: 100%; }
        .mode-row { display: flex; gap: 3px; flex-wrap: wrap; }
        .mode-row button { flex: 1; min-width: 44px; height: 32px; font-size: 10px; font-weight: bold; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
        .mode-row button.active { background: #007aff; color: #fff; border-color: #007aff; }
        .data-btn { flex: 1; height: 32px; font-size: 10px; font-weight: bold; border-radius: 6px; border: none; color: white; cursor: pointer; }
        .btn-out { background: #5856d6; }
        .btn-clr { background: #ff3b30; }
        .save-btn { height: 36px; font-size: 12px; background: #34c759; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
