<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>避難所レイアウト v31.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { --panel-h: 250px; --panel-w: 220px; }
        body { margin: 0; overflow: hidden; background: #2a2a2a; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        #main-container { flex: 1; position: relative; overflow: hidden; }
        canvas { display: block; background: #000; width: 100%; height: 100%; cursor: crosshair; }
        
        #top-panel { position: absolute; top: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.85); border-bottom: 1px solid #444; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; z-index: 100; gap: 8px; color: #fff; }
        #cur-box { width: 50px; height: 50px; border: 2px solid #007aff; border-radius: 8px; background: #222; background-size: contain; background-repeat: no-repeat; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #007aff; font-weight: bold; text-align: center; }
        #member-name-in { flex: 1; height: 40px; border: 1px solid #444; border-radius: 8px; padding: 0 10px; font-size: 14px; min-width: 0; outline: none; background: #333; color: #fff; }
        #open-list-btn { width: 50px; height: 50px; border-radius: 8px; border: 1px solid #444; background: #333; font-size: 24px; color: #aaa; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .deselect-btn { height: 50px; padding: 0 8px; border-radius: 8px; border: 1px solid #444; background: #444; color: #ccc; font-size: 11px; font-weight: bold; flex-shrink: 0; cursor: pointer; }
        .reload-btn { height: 50px; width: 50px; margin-left: auto; border-radius: 8px; border: 1px solid #ff9500; background: #fff; color: #ff9500; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }

        #bot-panel { background: rgba(0,0,0,0.9); border-top: 1px solid #444; padding: 8px 10px; box-sizing: border-box; z-index: 100; display: flex; flex-direction: column; gap: 6px; height: var(--panel-h); color: #fff; }
        @media (orientation: landscape) { :root { --panel-w: 220px; } body { flex-direction: row; } #bot-panel { width: var(--panel-w); height: 100%; border-top: none; border-left: 1px solid #444; padding: 10px 5px; overflow-x: hidden; overflow-y: auto; flex-shrink: 0; gap: 8px; } .tool-section { flex-direction: column; gap: 6px; align-items: center; } .row { width: 100%; gap: 4px; } input[type="range"] { min-width: 0; flex: 1; } }
        .row { display: flex; align-items: center; gap: 5px; }
        .row label { font-size: 10px; font-weight: bold; width: 12px; line-height: 1.1; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; color: #aaa; }
        input[type="range"] { flex: 1; height: 32px; cursor: pointer; margin: 0; background: transparent; }
        .prec-btn { width: 22px; height: 38px; font-size: 18px; border: 1px solid #444; background: #333; border-radius: 5px; color: #007aff; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .tool-section { display: flex; justify-content: space-between; gap: 5px; width: 100%; }
        #nudge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 105px; flex-shrink: 0; }
        #nudge-grid button { height: 36px; font-size: 18px; border: 1px solid #444; background: #333; border-radius: 6px; color: #007aff; }
        .mode-box { flex: 1; display: flex; flex-direction: column; gap: 4px; width: 100%; }
        .mode-row { display: flex; gap: 2px; }
        .mode-row button { flex: 1; height: 30px; font-size: 9px; font-weight: bold; border-radius: 5px; border: 1px solid #444; background: #333; color: #aaa; }
        .mode-row button.active { background: #007aff; color: #fff; }
        .data-btn { flex: 1; height: 30px; font-size: 10px; font-weight: bold; border-radius: 5px; border: none; color: white; }
        .btn-out { background: #5856d6; }
        .btn-clr { background: #ff3b30; }
        .save-btn { height: 34px; font-size: 11px; background: #34c759; border: none; border-radius: 6px; color: white; font-weight: bold; width: 100%; }

        #asset-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; }
        #asset-modal { width: 90%; max-height: 80%; background: #1a1a1a; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        #asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; overflow-y: auto; }
        .thumb { width: 60px; height: 60px; border-radius: 8px; border: 2px solid #333; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #000; }
        #export-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #export-img { max-width: 95%; max-height: 80%; border: 2px solid #555; }
    </style>
</head>
<body>
<div id="main-container">
    <canvas id="cvs"></canvas>
    <div id="top-panel">
        <div id="cur-box"></div>
        <input type="text" id="member-name-in" placeholder="ギルメン名" oninput="updateMemberName(this.value)">
        <button id="open-list-btn" onclick="toggleAssetModal(true)">＋</button>
        <button class="deselect-btn" onclick="deselect()">選択<br>解除</button>
        <button class="reload-btn" onclick="location.reload()">🔄</button>
    </div>
</div>

<div id="asset-overlay" onclick="if(event.target==this)toggleAssetModal(false)">
    <div id="asset-modal"><div id="asset-grid"><label style="width:60px; height:60px; border:2px dashed #444; border-radius:8px; display:flex; justify-content:center; align-items:center; font-size:24px; color:#555; background:#000;"><input type="file" id="img-in" hidden accept="image/*" multiple onchange="handleFiles(this.files)">📁</label></div></div>
</div>

<div id="bot-panel">
    <div class="row"><label><span>サ</span><span>イ</span><span>ズ</span></label><button class="prec-btn" onclick="adjS(-0.05)">-</button><input type="range" id="size-s" min="0.1" max="5" step="0.05"><button class="prec-btn" onclick="adjS(0.05)">+</button></div>
    <div class="row"><label><span>接</span><span>地</span></label><button class="prec-btn" onclick="adjO(-1)">-</button><input type="range" id="off-s" min="-100" max="100" step="1"><button class="prec-btn" onclick="adjO(1)">+</button></div>
    <div class="tool-section">
        <div id="nudge-grid"><button style="grid-column:2" onclick="nudge(0,-0.1)">↑</button><button style="grid-column:1" onclick="nudge(-0.1,0)">←</button><button style="grid-column:2" onclick="nudge(0,0.1)">↓</button><button style="grid-column:3" onclick="nudge(0.1,0)">→</button></div>
        <div class="mode-box">
            <button class="save-btn" onclick="exportImage()">画像として保存</button>
            <div style="display:flex; gap:3px;"><button class="data-btn btn-out" onclick="exportURL()">共有URL</button><button class="data-btn btn-clr" onclick="clearAll()">全消去</button></div>
            <div class="mode-row"><button id="m-move" onclick="setMode('move')">移動</button><button id="m-erase" onclick="setMode('erase')">消しゴム</button></div>
        </div>
    </div>
</div>

<div id="export-overlay" onclick="this.style.display='none'"><img id="export-img"></div>

<script>
const PRESETS = [
    { name: "HQ", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/HQ.png", s: 1.6, o: 1, gw: 2, gh: 2, ox: -0.1, oy: -0.2 },
    { name: "RSS", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/RSS.png", s: 1.6, o: -4, gw: 2, gh: 2, ox: -0.2, oy: -0.3 },
    { name: "OP", url: "https://raw.githubusercontent.com/orihina0193/map-tool/main/img/OP.png", s: 0.8, o: 0, gw: 1, gh: 1, ox: -0.1, oy: -0.1 }
];

// GitHubの画像を背景に設定（スペルミス反映済み）
const MAP_IMAGE_URL = "https://github.com/orihina0193/map-tool/blob/main/img/fioor.png?raw=true"; 

const cvs = document.getElementById('cvs'); const ctx = cvs.getContext('2d');
const T_W = 64, T_H = 32; 
let cam = { x: 0, y: 0, z: 1 }, assets = [], map = [], selIdx = -1, activeAsset = -1, mode = 'move';
let drag = false, pinch = false, lockedId = null, lastT = {x: 0, y: 0}, lastDist = 0, tempAssetStore = -1;
let mapImg = null, mapLoaded = false;

function init() { window.addEventListener('resize', resize); resize(); loadPresets().then(() => { loadMapImage(); const params = new URLSearchParams(window.location.search); const urlData = params.get('d'); if (urlData) applyData(urlData); else load(); cam.z = 0.5; cam.x = cvs.width/2; cam.y = cvs.height/2; render(); }); setupEvents(); }

function loadMapImage() { mapImg = new Image(); mapImg.crossOrigin = "anonymous"; mapImg.onload = () => { mapLoaded = true; render(); }; mapImg.src = MAP_IMAGE_URL; }

function toggleAssetModal(show) { document.getElementById('asset-overlay').style.display = show ? 'flex' : 'none'; }
function addThumb(idx) { const d = document.createElement('div'); d.className = 'thumb'; d.style.backgroundImage = `url(${assets[idx].src})`; d.onclick = () => { activeAsset = idx; tempAssetStore = idx; selIdx = -1; lockedId = null; setMode('move'); updateCurBox(); toggleAssetModal(false); render(); }; document.getElementById('asset-grid').appendChild(d); }
function updateCurBox() { const box = document.getElementById('cur-box'); const nameIn = document.getElementById('member-name-in'); if(selIdx !== -1) { box.style.backgroundImage = `url(${assets[map[selIdx].aIdx].src})`; nameIn.value = map[selIdx].mem || ""; } else if(activeAsset !== -1) { box.style.backgroundImage = `url(${assets[activeAsset].src})`; nameIn.value = ""; } else { box.style.backgroundImage = 'none'; nameIn.value = ""; } }
function updateMemberName(val) { if(selIdx !== -1) { map[selIdx].mem = val; save(); render(); } }

async function exportURL() { const exportMap = map.map(d => { const a = assets[d.aIdx]; const isPreset = (a.name !== null && a.name !== undefined); return { n: isPreset ? a.name : null, x: d.x, y: d.y, s: d.s, off: d.off, ox: d.ox, oy: d.oy, mem: d.mem, src: isPreset ? null : a.src }; }); const compressed = LZString.compressToEncodedURIComponent(JSON.stringify({ m: exportMap })); const fullUrl = window.location.href.split('?')[0] + "?d=" + compressed; try { const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(fullUrl)}`); const data = await res.json(); const finalUrl = data.shorturl || fullUrl; await navigator.clipboard.writeText(finalUrl); alert("共有URLをコピーしました"); } catch (err) { await navigator.clipboard.writeText(fullUrl); alert("共有URLをコピーしました"); } }
function applyData(code) { try { const json = LZString.decompressFromEncodedURIComponent(code); const d = JSON.parse(json); map = d.m.map(item => { let aIdx = assets.findIndex(a => a.name === item.n); if(aIdx === -1 && item.src) { const img = new Image(); img.src = item.src; assets.push({ img, src: item.src, name: null, defS: 1, defO: 0, gw: 1, gh: 1, ox: 0, oy: 0 }); addThumb(assets.length - 1); aIdx = assets.length - 1; } return { id: Date.now()+Math.random(), x: item.x, y: item.y, aIdx: aIdx===-1?0:aIdx, s: item.s, off: item.off, ox: item.ox, oy: item.oy, mem: item.mem || "" }; }); save(); render(); } catch(e) { console.error(e); } }
function resize() { const nw = cvs.parentElement.clientWidth, nh = cvs.parentElement.clientHeight; if(cvs.width>0){ cam.x+=(nw-cvs.width)/2; cam.y+=(nh-cvs.height)/2; } cvs.width=nw; cvs.height=nh; render(); }

const toS = (gx, gy) => { return { x: (gx - gy) * (T_W/2), y: (gx + gy) * (T_H/2) }; };
const toG = (sx, sy) => { let x = (sx - cam.x)/cam.z, y = (sy - cam.y)/cam.z; let gy = (y/(T_H/2) - x/(T_W/2))/2; return { x: x/(T_W/2) + gy, y: gy }; };

function render() {
    ctx.clearRect(0,0,cvs.width,cvs.height); ctx.save(); ctx.translate(cam.x, cam.y); ctx.scale(cam.z, cam.z);
    
    if (mapLoaded && mapImg) {
        ctx.drawImage(mapImg, -mapImg.width / 2, -mapImg.height / 2);
    }

    ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 1/cam.z;
    for(let i=-20; i<=20; i++){ let s = toS(i,-20), e = toS(i,20); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke(); s = toS(-20,i); e = toS(20,i); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke(); }
    
    map.sort((a,b)=>(Math.round(a.x)+Math.round(a.y))-(Math.round(b.x)+Math.round(b.y))).forEach((d, i) => {
        const a = assets[d.aIdx]; if(!a) return; 
        const w = T_W * d.s, h = (a.img.height/a.img.width) * w, anchor = toS(d.x + a.gw + d.ox, d.y + a.gh + d.oy); 
        ctx.drawImage(a.img, anchor.x - w / 2, anchor.y - h + d.off, w, h);
        
        if (d.mem) {
            ctx.save();
            const baseFont = 9.5, basePad = 3.2, baseRad = 2.2;
            const fVal = baseFont * d.s; const pVal = basePad * d.s; const rVal = baseRad * d.s;
            ctx.font = `bold ${fVal}px sans-serif`;
            const pos = toS(d.x + (a.gw / 2), d.y + (a.gh / 2));
            const txtW = ctx.measureText(d.mem).width;
            const bgW = txtW + (pVal * 2), bgH = fVal + pVal;
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.beginPath(); ctx.roundRect(pos.x - bgW/2, pos.y - bgH/2, bgW, bgH, rVal); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(d.mem, pos.x, pos.y);
            ctx.restore();
        }

        if(lockedId === d.id || (activeAsset === -1 && selIdx === i)) {
            ctx.strokeStyle = "#007aff"; ctx.lineWidth = (lockedId ? 1 : 3)/cam.z;
            const gx = Math.round(d.x), gy = Math.round(d.y), pS = toS(gx+a.gw, gy+a.gh), pW = toS(gx, gy+a.gh), pE = toS(gx+a.gw, gy), pN = toS(gx, gy); 
            ctx.beginPath(); ctx.moveTo(pS.x,pS.y); ctx.lineTo(pW.x,pW.y); ctx.lineTo(pN.x,pN.y); ctx.lineTo(pE.x,pE.y); ctx.closePath(); ctx.stroke(); 
        }
    });
    ctx.restore();
}

function handleStart(x, y) {
    const rawG = toG(x, y), gx_o = Math.floor(rawG.x), gy_o = Math.floor(rawG.y);
    let hitIdx = map.findLastIndex(d => { const a = assets[d.aIdx]; return rawG.x >= d.x && rawG.x < d.x + a.gw && rawG.y >= d.y && rawG.y < d.y + a.gh; });
    if(mode === 'erase' && hitIdx !== -1) { map.splice(hitIdx, 1); selIdx = -1; save(); updateCurBox(); render(); return; }
    if(mode === 'move') {
        if(hitIdx !== -1) { if(activeAsset !== -1) tempAssetStore = activeAsset; activeAsset = -1; selIdx = hitIdx; lockedId = map[selIdx].id; updateCurBox(); updatePanel(); render(); return; }
        if(activeAsset === -1 && tempAssetStore !== -1) { activeAsset = tempAssetStore; }
        if(activeAsset !== -1) { 
            const a = assets[activeAsset], nx = gx_o - (a.gw-1), ny = gy_o - (a.gh-1); 
            const n = {id: Date.now(), x: nx, y: ny, aIdx: activeAsset, s: a.defS, off: a.defO, ox: d_ox(activeAsset), oy: d_oy(activeAsset), mem: ""}; 
            map.push(n); selIdx = map.length - 1; lockedId = n.id; updateCurBox(); updatePanel(); save(); render(); return; 
        }
        selIdx = -1; lockedId = null; drag = true; updateCurBox(); render();
    }
}
function d_ox(idx){ return assets[idx].ox || 0; } function d_oy(idx){ return assets[idx].oy || 0; }
function handleMove(x, y, dx, dy) {
    const rawG = toG(x, y); 
    if(lockedId) { const dIdx = map.findIndex(d => d.id === lockedId); if(dIdx !== -1) { const d = map[dIdx], a = assets[d.aIdx], nx = Math.floor(rawG.x) - (a.gw-1), ny = Math.floor(rawG.y) - (a.gh-1); d.x = nx; d.y = ny; selIdx = dIdx; save(); } } 
    else if(drag) { cam.x += dx; cam.y += dy; } render();
}
function handleEnd() { drag = pinch = false; lockedId = null; render(); }
function setupEvents() {
    cvs.addEventListener('mousedown', e => { lastT = {x: e.clientX, y: e.clientY}; handleStart(e.clientX, e.clientY); });
    window.addEventListener('mousemove', e => { if(drag || lockedId) { handleMove(e.clientX, e.clientY, e.clientX-lastT.x, e.clientY-lastT.y); lastT = {x: e.clientX, y: e.clientY}; } });
    window.addEventListener('mouseup', handleEnd);
    cvs.addEventListener('wheel', e => { e.preventDefault(); cam.z *= (e.deltaY > 0 ? 0.9 : 1.1); render(); }, {passive: false});
    cvs.addEventListener('touchstart', e => { if(e.touches.length >= 2) { pinch = true; lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); return; } const t = e.touches[0]; lastT = {x: t.clientX, y: t.clientY}; handleStart(t.clientX, t.clientY); }, {passive: false});
    cvs.addEventListener('touchmove', e => { e.preventDefault(); if(pinch && e.touches.length >= 2) { const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); cam.z *= (d / lastDist); lastDist = d; } else if(!pinch) { const t = e.touches[0]; handleMove(t.clientX, t.clientY, t.clientX-lastT.x, t.clientY-lastT.y); lastT = {x: t.clientX, y: t.clientY}; } render(); }, {passive: false});
    cvs.addEventListener('touchend', handleEnd);
}
function deselect() { activeAsset = -1; tempAssetStore = -1; selIdx = -1; lockedId = null; updateCurBox(); render(); }
async function loadPresets() { for (const p of PRESETS) { await new Promise(res => { const img = new Image(); img.crossOrigin = "anonymous"; img.onload = () => { const src = crop(img), i2 = new Image(); i2.onload = () => { assets.push({ img: i2, src, name: p.name, defS: p.s, defO: p.o, gw: p.gw, gh: p.gh, ox: p.ox, oy: p.oy }); addThumb(assets.length - 1); res(); }; i2.src = src; }; img.src = p.url; }); } }
function handleFiles(files) { for (const f of files) { const reader = new FileReader(); reader.onload = e => { const img = new Image(); img.onload = () => { const src = crop(img), i2 = new Image(); i2.onload = () => { assets.push({ img: i2, src, name: null, defS: 1, defO: 0, gw: 1, gh: 1, ox: 0, oy: 0 }); addThumb(assets.length - 1); }; i2.src = src; }; img.src = e.target.result; }; reader.readAsDataURL(f); } }
function setMode(m) { mode = m; document.querySelectorAll('.mode-row button').forEach(b => b.classList.remove('active')); if(document.getElementById(`m-${m}`)) document.getElementById(`m-${m}`).classList.add('active'); render(); }
function save() { localStorage.setItem('map_v1ch_bg', JSON.stringify({m:map})); }
function load() { const s = localStorage.getItem('map_v1ch_bg'); if(s) { const d = JSON.parse(s); map = d.m || []; } }
function updatePanel() { if(selIdx!==-1){ document.getElementById('size-s').value = map[selIdx].s; document.getElementById('off-s').value = map[selIdx].off; } }
function adjS(v) { if(selIdx!==-1){ map[selIdx].s = parseFloat((map[selIdx].s+v).toFixed(2)); updatePanel(); save(); render(); } }
function adjO(v) { if(selIdx!==-1){ map[selIdx].off+=v; updatePanel(); save(); render(); } }
function nudge(dx,dy) { if(selIdx!==-1){ map[selIdx].ox=parseFloat((map[selIdx].ox+dx).toFixed(2)); map[selIdx].oy=parseFloat((map[selIdx].oy+dy).toFixed(2)); save(); render(); } }
function clearAll() { if(confirm("配置をすべて消去しますか？")){ map=[]; selIdx=-1; lockedId=null; save(); updateCurBox(); render(); } }
function exportImage() { deselect(); render(); document.getElementById('export-img').src = cvs.toDataURL(); document.getElementById('export-overlay').style.display='flex'; }
function crop(img) { const c = document.createElement('canvas'), t = c.getContext('2d'); c.width = img.width; c.height = img.height; t.drawImage(img,0,0); const d = t.getImageData(0,0,c.width,c.height).data; let x1=c.width, y1=c.height, x2=0, y2=0; for(let y=0; y<c.height; y++) for(let x=0; x<c.width; x++) if(d[(y*c.width+x)*4+3]>10){ x1=Math.min(x1,x); y1=Math.min(y1,y); x2=Math.max(x2,x); y2=Math.max(y2,y); } const w = x2-x1+1, h = y2-y1+1, c2 = document.createElement('canvas'); c2.width = w; h; c2.width = w; c2.height = h; c2.getContext('2d').drawImage(img,x1,y1,w,h,0,0,w,h); return c2.toDataURL(); }
init();
document.getElementById('size-s').addEventListener('input', (e) => { if(selIdx!==-1){ map[selIdx].s = parseFloat(e.target.value); render(); } });
document.getElementById('off-s').addEventListener('input', (e) => { if(selIdx!==-1){ map[selIdx].off = parseInt(e.target.value); render(); } });
</script>
</body>
</html>
